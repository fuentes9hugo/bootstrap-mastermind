<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelVibe - Contacto</title>
    <link rel="icon" type="image/svg+xml" href="img/logo.svg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="css/main.min.css">
    <link rel="stylesheet" href="css/styles.css">
    
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script defer src="js/app.js"></script>
</head>
<body class="bg-newbgdark text-newtextlight d-flex flex-column min-vh-100">
    <header>
        <nav class="navbar  fixed-top bg-newbglight navbar-expand-lg" data-bs-theme="light">
            <div class="container-fluid">
                <a href="index.html" class="navbar-brand p-0">
                    <img src="img/logo.svg" alt="Logo E-commerce" width="80px">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar-spy" aria-controls="navbar-spy" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbar-spy">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item">
                            <a class="nav-link" aria-current="page" href="index.html">Inicio</a>
                        </li>
                    </ul>
                    <div class="navbar-nav">
                        <a class="nav-link" href="contact.html">Contactar</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>
    <main class="flex-fill d-flex align-items-center justify-content-center">
        <section class="container pb-5 pb-lg-0">
            <div class="row justify-content-center">
                <div class="col-10 col-md-8">
                    <h1 class="text-uppercase">Contactar</h1>
                    <form class="needs-validation" novalidate="">
                        <div class="row g-3">
                            <div class="col-12">
                                <label for="name" class="form-label">Nombre</label>
                                <input type="text" class="form-control" id="name" required="">
                                <div class="invalid-feedback">
                                    Es necesario un nombre.
                                </div>
                            </div>

                            <div class="col-12">
                                <label for="country" class="form-label">País</label>
                                <input type="text" class="form-control" id="country" required="">
                                <div class="invalid-feedback">
                                    Es necesartio rellenar el campo País.
                                </div>
                            </div>

                            <div class="col-12">
                                <label for="town" class="form-label">Ciudad</label>
                                <input type="text" class="form-control" id="town" required="">
                                <div class="invalid-feedback">
                                    Es necesario rellenar el campo ciudad.
                                </div>
                            </div>

                            <div class="col-12">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" placeholder="tu@email.com" required="">
                                <div class="invalid-feedback">
                                    Introduzca un email válido.
                                </div>
                            </div>

                            <div class="col-12">
                                <label for="model" class="form-label">Modelo</label>
                                <select class="form-select form-select-dark" id="model" required="">
                                    <option value="">Elige...</option>
                                    <option>PC (AMD Ryzen 9 9950X3D)</option>
                                    <option>PC (Intel Core i9 14900K)</option>
                                    <option>PC (AMD Ryzen 7 9700X)</option>
                                    <option>PC (Intel Core Ultra 7 265K)</option>
                                </select>
                                <div class="invalid-feedback">
                                    Seleccione un modelo.
                                </div>
                            </div>

                            <div class="col-12">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="customer-type" id="particular" checked>
                                    <label class="form-check-label" for="particular">Particular</label>
                                </div>

                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="customer-type" id="company">
                                    <label class="form-check-label" for="company">Empresa</label>
                                </div>
                            </div>

                            <div class="col-12">
                                <label for="message" class="form-label">Mensaje</label>
                                <textarea class="form-control" id="message" rows="5"></textarea>
                            </div>

                            <div class="col-12 mt-5">
                                <button class="w-100 btn btn-newbtndark btn-lg mb-3 mx-auto rounded-0 text-uppercase" type="submit">Enviar</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>
    <footer class="container-fluid bg-newbglight text-newtextdark py-3" data-bs-theme="dark">
        <div class="text-center">
            <p class="mb-0"><small>© Copyright PixelVibe | Calle Mayor 12, Madrid | +34 910 123 456</small></p>
        </div>
    </footer>
</body>
</html>
